<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marcio Cunha</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #06070b;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}

/* CARD RESPONSIVO */
.card {
  width: 92vw;
  max-width: 600px;
  aspect-ratio: 2 / 1;

  position: relative;
  background: #0c0d14;
  border-radius: 16px;
  overflow: hidden;
  font-family: 'IBM Plex Sans', sans-serif;

  box-shadow:
    0 0 0 1px rgba(232,160,32,0.20),
    0 20px 60px rgba(0,0,0,0.9);
}

/* BACKGROUND */
.bg-grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(232,160,32,.07) 1px, transparent 1px),
    linear-gradient(90deg, rgba(232,160,32,.07) 1px, transparent 1px);
  background-size: 30px 30px;
}

/* LAYOUT */
.inner {
  display: flex;
  height: 100%;
}

/* FOTO AJUSTADA */
.col-photo {
  width: 160px;
  background: #12141e;
  position: relative;
  overflow: hidden;
}

.col-photo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center top;
  transform: scale(0.9);
}

.col-photo::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(to right, rgba(0,0,0,0) 30%, #0c0d14 100%);
}

/* INFO */
.col-info {
  flex: 1;
  padding: 16px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.chip {
  font-size: 8px;
  color: #e8a020;
  border: 1px solid rgba(232,160,32,.3);
  padding: 4px 8px;
  display: inline-block;
  margin-bottom: 8px;
}

.name {
  font-family: 'Bebas Neue';
  font-size: 36px;
  color: #81b181;
}

.name em {
  color: #81b181;
  font-style: normal;
}

.role {
  font-size: 10px;
  color: rgba(255,255,255,.4);
  margin: 8px 0;
}

.tagline {
  font-size: 11px;
  color: rgba(255,255,255,.5);
}

/* QR */
.col-qr {
  width: 300px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.qr-frame {
  width: 180px;
  height: 180px;
  background: #fff;
  padding: 5px;
  border-radius: 6px;
}

.qr-frame img {
  width: 100%;
  height: 100%;
}

.qr-label {
  font-size: 9px;
  color: rgba(255,255,255,.4);
  text-align: center;
  margin-top: 8px;
}
</style>
</head>

<body>

<div class="card">
  <div class="bg-grid"></div>

  <div class="inner">

    <!-- FOTO -->
    <div class="col-photo">
      <img src="euSemFundo.png" alt="Márcio">
    </div>

    <!-- INFO -->
    <div class="col-info">
      <div>
        <div class="chip">Soluções Digitais</div>
        <div class="name">Marcio Cunha</div>
        <div class="role">
          Especialista em sistemas & automação<br>
          Pequenos negócios
        </div>
        <div class="tagline">
          Do controle industrial à clareza financeira.
        </div>
      </div>
    </div>

    <!-- QR -->
    <div class="col-qr">
      <div class="qr-frame">
        <img src="qrcode.png">
      </div>
      <div class="qr-label">
        Aponte a câmera
      </div>
    </div>

  </div>
</div>

</body>
</html>
